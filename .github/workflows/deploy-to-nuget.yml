name: Deploy To NuGet

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  retrieve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.get-tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag on commit
        id: get-tag
        run: |
          set -euo pipefail
          echo "GITHUB_REF=${GITHUB_REF}"
          TAG=""
          if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG=$(git tag --points-at HEAD | head -n1 || true)
          fi

          if [ -z "${TAG}" ]; then
            echo "No tag found attached to this commit. Failing the job."
            exit 1
          fi

          TAG="${TAG#v}"
          echo "Found tag: ${TAG}"
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"

  pack-and-publish-nuget-package:
    runs-on: ubuntu-latest
    needs: retrieve-tag
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore NTComponents.Charts.slnx

      - name: Build
        run: dotnet build NTComponents.Charts.slnx --configuration Release --no-restore

      - name: Pack
        run: |
          dotnet pack NTComponents.Charts/NTComponents.Charts.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkg \
            /p:PackageVersion=${{ needs.retrieve-tag.outputs.tag_name }} \
            /p:ContinuousIntegrationBuild=true

      - name: Publish package to NuGet
        run: dotnet nuget push ./nupkg/NTComponents.Charts.*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish symbols to NuGet
        run: |
          if ls ./nupkg/*.snupkg >/dev/null 2>&1; then
            dotnet nuget push ./nupkg/*.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          else
            echo "No .snupkg files found."
          fi
